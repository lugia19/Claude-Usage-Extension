<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="tracker-styles.css">
	<style>
		:root {
			--bg-primary: #1e1e1e;
			--bg-secondary: #252526;
			--text-primary: #d4d4d4;
			--text-secondary: #9cdcfe;
			--button-bg: #2d2d2d;
			--button-hover: #3e3e3e;
			--button-active: #505050;
			--border-color: #454545;
		}

		body {
			width: 300px;
			margin: 0;
			padding: 16px;
			background-color: var(--bg-primary);
			color: var(--text-primary);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			font-size: 13px;
			line-height: 1.5;
		}

		p {
			margin: 0 0 12px 0;
		}

		.button-container {
			display: flex;
			gap: 8px;
		}

		button {
			flex: 1;
			background: var(--button-bg);
			color: var(--text-primary);
			border: 1px solid var(--border-color);
			padding: 8px 12px;
			border-radius: 4px;
			cursor: pointer;
			font-size: 13px;
			transition: background-color 0.2s, transform 0.1s;
		}

		button:hover {
			background: var(--button-hover);
		}

		button:active {
			background: var(--button-active);
			transform: translateY(1px);
		}

		#donate {
			background: #2c84db;
			border-color: #2c84db;
		}

		#donate:hover {
			background: #3a93e8;
		}

		#donate:active {
			background: #2474c4;
		}

		#usage-container {
			margin-bottom: 12px;
		}

		.popup-loading, .popup-error, .popup-empty {
			font-size: 12px;
			color: #888;
			padding: 4px 0;
		}

		.popup-org-header {
			font-size: 11px;
			color: #888;
			margin-bottom: 4px;
			padding-bottom: 2px;
			border-bottom: 1px solid var(--border-color);
		}

		.popup-org-section {
			margin-bottom: 8px;
		}

		.popup-org-section:last-child {
			margin-bottom: 0;
		}

		.ut-progress-track {
			background: #333;
		}
	</style>
</head>

<body>
	<div id="usage-container">
		<div class="popup-loading">Loading usage data...</div>
	</div>
	<p id="popup-help">If you clicked here because you can't find the usage stats, try reloading the page or authorizing the extension to run on claude.ai &mdash; the usage stats are injected directly into the page.</p>
	<div class="button-container">
		<button id="debug">Debug Logs</button>
		<button id="donate">Donate</button>
	</div>
	<script src="lib/browser-polyfill.min.js"></script>
	<script src="content-components/localization.js"></script>
	<script src="content-components/ui_dataclasses.js"></script>
	<script src="popup.js"></script>
</body>

</html>
